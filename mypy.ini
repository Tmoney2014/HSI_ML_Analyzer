# mypy.ini — HSI_ML_Analyzer 타입 검사 설정
# Brownfield baseline: 기존 위반은 per-file override로 제외
# 새 파일 작성 시 override 목록에 추가하지 말 것

[mypy]
ignore_missing_imports = True
explicit_package_bases = True

# ── Pre-existing violations (수정 불가 파일) ──────────────────────────────────
# views/tabs/tab_analysis.py: img_windows 타입 어노테이션 누락
[mypy-Python_Analysis.views.tabs.tab_analysis]
ignore_errors = True

# views/components/custom_toolbar.py: NavigationToolbar2QT toolitems 타입 불일치
[mypy-Python_Analysis.views.components.custom_toolbar]
ignore_errors = True

# services/processing_service.py: white_ref/dark_ref implicit Optional
[mypy-Python_Analysis.services.processing_service]
ignore_errors = True

# services/learning_service.py: Module None 초기화 타입 불일치
[mypy-Python_Analysis.services.learning_service]
ignore_errors = True

# viewmodels/training_vm.py: QThread/None 타입 불일치 + dict/set 어노테이션 누락 (다수)
[mypy-Python_Analysis.viewmodels.training_vm]
ignore_errors = True

# viewmodels/analysis_vm.py: list/str 타입 불일치
[mypy-Python_Analysis.viewmodels.analysis_vm]
ignore_errors = True
